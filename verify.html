<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying Login - Spoke OS</title>
  <link rel="icon" href="/spokefavcon.svg" type="image/svg+xml">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #40514F 0%, #2a3a38 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .verify-container {
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #BEDA81;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    .error {
      color: #f8d7da;
      background: rgba(248, 215, 218, 0.1);
      padding: 16px;
      border-radius: 4px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="verify-container">
    <div class="spinner"></div>
    <h1>Verifying your login...</h1>
    <p>Please wait while we authenticate you.</p>
    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script>
    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('error').textContent = 'Invalid or missing token. Please try logging in again.';
      document.getElementById('error').style.display = 'block';
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('h1').textContent = 'Login Failed';
    } else {
      // Redirect to verify endpoint which will set cookie and redirect
      window.location.href = `/api/auth/verify?token=${encodeURIComponent(token)}`;
    }
  </script>
</body>
</html>
