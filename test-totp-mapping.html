<!DOCTYPE html>
<html>
<head>
  <title>TOTP Mapping Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: white !important;
      color: #333 !important;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border: 1px solid #ddd;
    }
    h1 { color: #40514F; margin-bottom: 20px; font-size: 24px; }
    p { color: #666; margin-bottom: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      background: #BEDA81;
      color: #40514F;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #A8C566; }
    .result {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ddd;
      display: none;
    }
    .result.show { display: block; }
    .result.success { background: #e8f5e9; border-color: #4caf50; }
    .result.error { background: #ffebee; border-color: #f44336; }
    .row { margin: 10px 0; padding: 10px; background: #f5f5f5; }
    .label { font-weight: bold; }
    .value { font-family: monospace; }
    .status { margin-top: 15px; padding: 10px; font-weight: bold; }
    .pass { color: green; background: #e8f5e9; }
    .fail { color: red; background: #ffebee; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TOTP Mapping Test</h1>
    <p>Test if a user's TOTP secret is correctly configured.</p>

    <div class="form-group">
      <label>User Email:</label>
      <input type="text" id="username" value="jherd@focusplan.co.nz">
    </div>

    <button onclick="testMapping()">Test Mapping</button>

    <div id="result" class="result">
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    function testMapping() {
      const username = document.getElementById('username').value.trim();
      const resultDiv = document.getElementById('result');
      const resultContent = document.getElementById('resultContent');

      if (!username) {
        resultContent.innerHTML = '<div class="row">ERROR: Please enter a user email</div>';
        resultDiv.classList.add('show', 'error');
        return;
      }

      resultContent.innerHTML = '<div class="row">Testing...</div>';
      resultDiv.classList.add('show');

      fetch('/api/auth/test-mapping?testUser=' + encodeURIComponent(username))
        .then(r => r.json())
        .then(data => {
          let html = '';

          if (data.error) {
            resultDiv.classList.remove('success');
            resultDiv.classList.add('error');
            html = '<div class="row">ERROR: ' + data.error + '</div>';
          } else {
            const willShow = data.wouldShowQRCode;
            resultDiv.classList.remove('error');
            if (willShow) {
              resultDiv.classList.add('success');
            } else {
              resultDiv.classList.add('error');
            }

            html = '<div class="row"><strong>User:</strong> <span class="value">' + data.testUser + '</span></div>';
            html += '<div class="row"><strong>TOTP Key:</strong> <span class="value">' + data.mappedToTOTPKey + '</span></div>';
            html += '<div class="row"><strong>Secret Configured:</strong> ' + (data.secretConfigured ? 'YES' : 'NO') + '</div>';
            html += '<div class="row"><strong>Already Setup:</strong> ' + (data.isAlreadySetup ? 'YES' : 'NO') + '</div>';
            html += '<div class="status ' + (willShow ? 'pass' : 'fail') + '">' + data.status + '</div>';
          }

          resultContent.innerHTML = html;
        })
        .catch(err => {
          resultDiv.classList.add('error');
          resultDiv.classList.remove('success');
          resultContent.innerHTML = '<div class="row">ERROR: ' + err.message + '</div>';
        });
    }

    // Auto-test on page load
    window.onload = function() {
      setTimeout(testMapping, 500);
    };
  </script>
</body>
</html>
