<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Spoke Operating System</title>
  <link rel="icon" href="/spokefavcon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== SPOKE SOLUTIONS DESIGN SYSTEM ===== */

    /* ---- Color Tokens ---- */
    :root {
      /* Brand core */
      --mineral: #40514F;
      --zest: #BEDA81;
      --stone: #EDEDE1;
      --white: #FFFFFF;
      --black: #161A19;

      /* Mineral scale (cool green-grey) */
      --mineral-900: #28332F;
      --mineral-800: #33403D;
      --mineral-700: #40514F;
      --mineral-600: #4E625F;
      --mineral-500: #5F7572;
      --mineral-400: #859895;
      --mineral-300: #AAB8B5;
      --mineral-200: #CBD4D2;
      --mineral-100: #E3E8E7;
      --mineral-50: #F1F4F3;

      /* Zest scale (leaf green accent) */
      --zest-900: #5E7333;
      --zest-800: #79913F;
      --zest-700: #93AF52;
      --zest-600: #A8C566;
      --zest-500: #BEDA81;
      --zest-400: #CCE29A;
      --zest-300: #D9EBB4;
      --zest-200: #E7F2CF;
      --zest-100: #F2F8E7;

      /* Stone scale (warm neutrals) */
      --stone-500: #C9C9B8;
      --stone-400: #D8D8CB;
      --stone-300: #E2E2D6;
      --stone-200: #EDEDE1;
      --stone-100: #F5F5EE;
      --stone-50: #FBFBF6;

      /* Semantic signal colors (muted, earthy) */
      --signal-success: #5E8C4E;
      --signal-success-soft: #E4EFDD;
      --signal-warning: #C58A3A;
      --signal-warning-soft: #F6EAD6;
      --signal-danger: #B4503F;
      --signal-danger-soft: #F4E0DB;
      --signal-info: #4E6F7D;
      --signal-info-soft: #DEEAEE;

      /* Semantic surface aliases */
      --surface-page: #F5F5EE;
      --surface-card: #FFFFFF;
      --surface-sunken: #EDEDE1;
      --surface-inverse: #33403D;
      --surface-accent: #F2F8E7;

      /* Semantic text aliases */
      --text-strong: #28332F;
      --text-body: #33403D;
      --text-muted: #5F7572;
      --text-subtle: #859895;
      --text-inverse: #F5F5EE;
      --text-accent: #5E7333;

      /* Semantic border aliases */
      --border-soft: #E2E2D6;
      --border-default: #CBD4D2;
      --border-strong: #AAB8B5;
      --border-inverse: #4E625F;

      /* Interactive */
      --action-primary: #40514F;
      --action-primary-hover: #33403D;
      --action-primary-press: #28332F;
      --action-accent: #BEDA81;
      --action-accent-hover: #A8C566;
      --action-accent-press: #93AF52;
      --focus-ring: #93AF52;

      /* Typography */
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'Courier New', monospace;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;

      /* Type scale (rem, 1rem = 16px) */
      --text-3xs: 0.6875rem; /* 11px */
      --text-2xs: 0.75rem; /* 12px */
      --text-xs: 0.8125rem; /* 13px */
      --text-sm: 0.9375rem; /* 15px */
      --text-md: 1rem; /* 16px */
      --text-lg: 1.125rem; /* 18px */
      --text-xl: 1.375rem; /* 22px */
      --text-2xl: 1.75rem; /* 28px */
      --text-3xl: 2.25rem; /* 36px */
      --text-4xl: 3rem; /* 48px */
      --text-5xl: 4rem; /* 64px */
      --text-6xl: 5.5rem; /* 88px */

      /* Line heights */
      --leading-tight: 1.08;
      --leading-snug: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;

      /* Letter spacing */
      --tracking-tight: -0.02em;
      --tracking-normal: 0;
      --tracking-wide: 0.04em;
      --tracking-caps: 0.12em;

      /* Spacing (8px base) */
      --space-0: 0;
      --space-1: 0.25rem; /* 4px */
      --space-2: 0.5rem; /* 8px */
      --space-3: 0.75rem; /* 12px */
      --space-4: 1rem; /* 16px */
      --space-5: 1.5rem; /* 24px */
      --space-6: 2rem; /* 32px */
      --space-7: 2.5rem; /* 40px */
      --space-8: 3rem; /* 48px */
      --space-9: 4rem; /* 64px */
      --space-10: 5rem; /* 80px */

      /* Border radius */
      --radius-xs: 3px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 18px;
      --radius-pill: 999px;

      /* Shadows (warm-tinted, never blue) */
      --shadow-xs: 0 1px 2px rgba(40, 51, 47, 0.06);
      --shadow-sm: 0 1px 3px rgba(40, 51, 47, 0.08), 0 1px 2px rgba(40, 51, 47, 0.05);
      --shadow-md: 0 4px 12px rgba(40, 51, 47, 0.08), 0 2px 4px rgba(40, 51, 47, 0.05);
      --shadow-lg: 0 12px 28px rgba(40, 51, 47, 0.12), 0 4px 8px rgba(40, 51, 47, 0.06);
      --shadow-xl: 0 24px 56px rgba(40, 51, 47, 0.16), 0 8px 16px rgba(40, 51, 47, 0.08);
      --shadow-focus: 0 0 0 3px rgba(147, 175, 82, 0.45);

      /* Motion */
      --ease-standard: cubic-bezier(0.2, 0, 0.1, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 120ms;
      --duration-base: 200ms;
      --duration-slow: 320ms;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, var(--mineral-900) 0%, var(--mineral-800) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      color: var(--text-body);
    }

    .login-container {
      background: var(--surface-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: var(--space-8);
      max-width: 500px;
      width: 100%;
      transition: box-shadow var(--duration-base) var(--ease-standard);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-header img {
      height: 80px;
      margin-bottom: var(--space-5);
      transition: opacity var(--duration-base) var(--ease-standard);
    }

    .login-header h1 {
      font-family: var(--font-display);
      font-style: italic;
      font-size: var(--text-3xl);
      color: var(--text-strong);
      margin-bottom: var(--space-2);
      line-height: var(--leading-snug);
    }

    .login-header p {
      color: var(--text-muted);
      font-size: var(--text-sm);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: var(--space-5);
    }

    label {
      display: block;
      font-size: var(--text-2xs);
      font-weight: var(--weight-semibold);
      color: var(--text-strong);
      margin-bottom: var(--space-2);
      letter-spacing: var(--tracking-caps);
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      font-size: var(--text-md);
      font-family: var(--font-sans);
      background: var(--white);
      color: var(--text-body);
      transition: border-color var(--duration-base) var(--ease-standard),
                  box-shadow var(--duration-base) var(--ease-standard);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--action-accent);
      box-shadow: var(--shadow-focus);
    }

    input[type="text"].code-input {
      letter-spacing: 0.2em;
      text-align: center;
      font-weight: var(--weight-bold);
      font-family: var(--font-mono);
      font-size: var(--text-lg);
    }

    button {
      width: 100%;
      padding: var(--space-3) var(--space-5);
      background: var(--action-accent);
      color: var(--text-strong);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-md);
      font-weight: var(--weight-semibold);
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background-color var(--duration-base) var(--ease-standard),
                  transform var(--duration-fast) var(--ease-standard),
                  box-shadow var(--duration-base) var(--ease-standard);
    }

    button:hover {
      background-color: var(--action-accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    button:active {
      transform: translateY(0);
    }

    button:focus {
      outline: none;
      box-shadow: var(--shadow-focus);
    }

    button:disabled {
      background-color: var(--border-strong);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: var(--space-5);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      display: none;
      border-left: 4px solid;
      animation: slideDown var(--duration-base) var(--ease-out);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.success {
      background-color: var(--signal-success-soft);
      color: var(--signal-success);
      border-left-color: var(--signal-success);
    }

    .message.error {
      background-color: var(--signal-danger-soft);
      color: var(--signal-danger);
      border-left-color: var(--signal-danger);
    }

    .message.info {
      background-color: var(--signal-info-soft);
      color: var(--signal-info);
      border-left-color: var(--signal-info);
    }

    .message.show {
      display: block;
    }

    .section {
      display: none;
    }

    .section.show {
      display: block;
    }

    .qr-container {
      text-align: center;
      margin: var(--space-5) 0;
      padding: var(--space-5);
      background: var(--surface-accent);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      display: none;
    }

    .qr-container.show {
      display: block;
      animation: slideDown var(--duration-base) var(--ease-out);
    }

    .qr-container img {
      max-width: 200px;
      border: 1px solid var(--border-default);
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: var(--white);
    }

    .qr-instructions {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: var(--space-4);
      line-height: var(--leading-relaxed);
    }

    .step-indicator {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
      justify-content: center;
    }

    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--border-soft);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-md);
      font-weight: var(--weight-bold);
      transition: all var(--duration-base) var(--ease-standard);
      border: 2px solid var(--border-soft);
    }

    .step.active {
      background: var(--action-accent);
      color: var(--text-strong);
      border-color: var(--action-accent);
      box-shadow: var(--shadow-md);
    }

    .step.complete {
      background: var(--signal-success);
      color: var(--white);
      border-color: var(--signal-success);
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-sm);
      margin-top: var(--space-5);
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-soft);
      border-top-color: var(--action-accent);
      border-radius: 50%;
      animation: spin var(--duration-slow) linear infinite;
      margin-right: var(--space-2);
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .setup-button {
      background: var(--surface-sunken);
      color: var(--text-body);
      font-size: var(--text-2xs);
      font-weight: var(--weight-semibold);
      padding: var(--space-2) var(--space-4);
      margin-top: var(--space-3);
      width: auto;
      display: inline-block;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--duration-base) var(--ease-standard);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
    }

    .setup-button:hover {
      background: var(--border-soft);
      border-color: var(--border-strong);
    }

    .setup-button:focus {
      outline: none;
      box-shadow: var(--shadow-focus);
    }

    .setup-status {
      font-size: var(--text-2xs);
      color: var(--text-muted);
      text-align: center;
      margin-top: var(--space-2);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-container {
        padding: var(--space-6);
        border-radius: var(--radius-lg);
      }

      .login-header h1 {
        font-size: var(--text-2xl);
      }

      .login-header img {
        height: 64px;
      }

      button {
        padding: var(--space-3) var(--space-4);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: var(--space-3);
      }

      .login-container {
        padding: var(--space-5);
      }

      .login-header {
        margin-bottom: var(--space-6);
      }

      .login-header h1 {
        font-size: var(--text-xl);
      }

      .step-indicator {
        margin-bottom: var(--space-6);
      }

      .form-group {
        margin-bottom: var(--space-4);
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="/spoke-logo-landscape-mineral.png" alt="Spoke" />
      <h1>Spoke OS</h1>
      <p>Secure Access</p>
    </div>

    <div class="step-indicator">
      <div class="step active" id="step1">1</div>
      <div class="step" id="step2">2</div>
    </div>

    <!-- STEP 1: Username & Password -->
    <div id="passwordSection" class="section show">
      <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--mineral);">Step 1: Login</h2>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="username" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="password" required />
      </div>

      <button onclick="verifyPassword()">Continue</button>
      <div id="passwordMessage" class="message"></div>
      <div id="passwordLoading" class="loading"></div>
    </div>

    <!-- STEP 2: Authenticator -->
    <div id="authSection" class="section">
      <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--mineral);">Step 2: Authenticate</h2>

      <!-- TOTP Secret (shown only on first setup) -->
      <div id="qrContainer" class="qr-container">
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 16px;"><strong>Scan this QR code:</strong></p>
        <div style="text-align: center; margin-bottom: 16px;">
          <img id="qrCode" alt="QR Code" style="max-width: 200px; border: 2px solid #ddd; padding: 8px; border-radius: 4px;" />
        </div>
        <div style="background: #f5f5f5; padding: 12px; border-radius: 4px; margin-bottom: 16px;">
          <p style="font-size: 11px; color: #666; margin: 0 0 8px 0;">Or enter manually:</p>
          <p id="secretKey" style="font-family: monospace; font-size: 12px; font-weight: bold; word-break: break-all; margin: 0; padding: 8px; background: white; border: 1px solid #ddd; border-radius: 4px; user-select: all; cursor: pointer;">Loading...</p>
        </div>
      </div>

      <!-- Setup button (if not already set up) -->
      <div id="setupPrompt" style="display: none; text-align: center; margin-bottom: 20px;">
        <p style="font-size: 14px; color: var(--muted); margin-bottom: 12px;">New authenticator setup?</p>
        <button class="setup-button" onclick="showQRCode()">Show QR Code</button>
        <div class="setup-status">Already scanned? Just enter your code below</div>
      </div>

      <!-- Code input -->
      <div class="form-group">
        <label>Enter 6-digit code from Google Authenticator</label>
        <input type="text" id="code" class="code-input" placeholder="000000" maxlength="6" inputmode="numeric" />
      </div>

      <button onclick="verifyCode()">Verify</button>
      <button style="background: #ddd; color: var(--black); margin-top: 12px;" onclick="goBackToPassword()">Back</button>
      <div id="authMessage" class="message"></div>
      <div id="authLoading" class="loading"></div>
    </div>
  </div>

  <script>
    let currentUsername = null;
    let isFirstTimeSetup = false;

    async function verifyPassword() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const messageDiv = document.getElementById('passwordMessage');
      const loadingDiv = document.getElementById('passwordLoading');

      if (!username || !password) {
        showMessage(messageDiv, 'Please enter username and password', 'error');
        return;
      }

      loadingDiv.classList.add('show');
      messageDiv.classList.remove('show');

      try {
        const response = await fetch('/api/auth/password-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          currentUsername = username;
          showMessage(messageDiv, '✓ Credentials verified', 'success');
          setTimeout(() => {
            goToAuthenticator();
          }, 1000);
        } else {
          showMessage(messageDiv, data.error || 'Invalid credentials', 'error');
        }
      } catch (error) {
        console.error('Password verification error:', error);
        showMessage(messageDiv, 'Login failed. Try again.', 'error');
      } finally {
        loadingDiv.classList.remove('show');
      }
    }

    async function goToAuthenticator() {
      document.getElementById('passwordSection').classList.remove('show');
      document.getElementById('authSection').classList.add('show');
      document.getElementById('step1').classList.add('complete');
      document.getElementById('step2').classList.add('active');

      // Check server to see if user has already set up authenticator
      try {
        const response = await fetch('/api/auth/totp-setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUsername }),
          credentials: 'include'
        });
        const data = await response.json();

        if (response.ok && data.secret) {
          // First time setup: show QR code
          document.getElementById('qrContainer').classList.add('show');
          document.getElementById('setupPrompt').style.display = 'none';
          document.getElementById('secretKey').textContent = data.secret;

          const otpauthUrl = `otpauth://totp/Spoke OS (${currentUsername})?secret=${data.secret}&issuer=Spoke`;
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(otpauthUrl)}`;
          document.getElementById('qrCode').src = qrUrl;

          // Mark that we showed the QR this session
          localStorage.setItem(`totp_setup_${currentUsername}`, 'true');
        } else if (data.error === 'already_setup') {
          // Already set up: hide all setup UI, just show code input
          document.getElementById('setupPrompt').style.display = 'none';
          document.getElementById('qrContainer').classList.remove('show');
        }
      } catch (error) {
        console.error('Failed to check authenticator setup:', error);
        // Default to already set up (safer fallback)
        document.getElementById('setupPrompt').style.display = 'none';
        document.getElementById('qrContainer').classList.remove('show');
      }

      document.getElementById('code').focus();
    }

    async function showQRCode() {
      document.getElementById('qrContainer').classList.add('show');
      document.getElementById('setupPrompt').style.display = 'none';

      try {
        const response = await fetch('/api/auth/totp-setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: currentUsername }),
          credentials: 'include'
        });
        const data = await response.json();

        // Check if user has already been set up
        if (!response.ok && data.error === 'already_setup') {
          document.getElementById('qrContainer').classList.remove('show');
          document.getElementById('setupPrompt').style.display = 'none';
          showMessage(document.getElementById('authMessage'), data.message || 'Enter your authenticator code', 'success');
          return;
        }

        if (!data.secret) {
          showMessage(document.getElementById('authMessage'), 'Failed to get authenticator setup', 'error');
          return;
        }

        // Display the secret key as text
        document.getElementById('secretKey').textContent = data.secret;

        // Generate QR code URL
        const otpauthUrl = `otpauth://totp/Spoke OS (${currentUsername})?secret=${data.secret}&issuer=Spoke`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(otpauthUrl)}`;

        // Set the QR code image
        document.getElementById('qrCode').src = qrUrl;
      } catch (error) {
        console.error('Failed to get authenticator setup:', error);
        showMessage(document.getElementById('authMessage'), 'Failed to get authenticator setup', 'error');
      }
    }

    async function verifyCode() {
      const code = document.getElementById('code').value.trim();
      const messageDiv = document.getElementById('authMessage');
      const loadingDiv = document.getElementById('authLoading');

      if (!code || code.length !== 6) {
        showMessage(messageDiv, 'Code must be 6 digits', 'error');
        return;
      }

      loadingDiv.classList.add('show');
      messageDiv.classList.remove('show');

      try {
        const response = await fetch('/api/auth/totp-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, username: currentUsername }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok) {
          // Mark this user as set up on this browser
          localStorage.setItem(`totp_setup_${currentUsername}`, 'true');

          showMessage(messageDiv, '✓ Authenticated! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1500);
        } else {
          showMessage(messageDiv, data.error || 'Invalid code', 'error');
          document.getElementById('code').value = '';
          document.getElementById('code').focus();
        }
      } catch (error) {
        console.error('Code verification error:', error);
        showMessage(messageDiv, 'Verification failed', 'error');
      } finally {
        loadingDiv.classList.remove('show');
      }
    }

    function goBackToPassword() {
      currentUsername = null;
      isFirstTimeSetup = false;
      document.getElementById('authSection').classList.remove('show');
      document.getElementById('passwordSection').classList.add('show');
      document.getElementById('step1').classList.remove('complete');
      document.getElementById('step2').classList.remove('active');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('code').value = '';
    }

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message ${type} show`;
    }

    // Auto-submit on 6 digits
    document.getElementById('code').addEventListener('input', function() {
      if (this.value.length === 6) {
        verifyCode();
      }
    });
  </script>
</body>
</html>
