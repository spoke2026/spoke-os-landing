<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Spoke Operating System</title>
  <link rel="icon" href="/spokefavcon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --mineral: #40514F;
      --zest: #BEDA81;
      --stone: #EDEDE1;
      --paper: #FAFAF4;
      --black: #1A1418;
      --muted: #68716E;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--mineral) 0%, #2a3a38 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--paper);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      padding: 48px;
      max-width: 400px;
      width: 100%;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--mineral);
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      letter-spacing: 4px;
      text-align: center;
      font-weight: 600;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--zest);
      box-shadow: 0 0 0 3px rgba(190, 218, 129, 0.1);
    }

    button {
      width: 100%;
      padding: 12px 24px;
      background: var(--zest);
      color: var(--black);
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #a4c767;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 24px;
      padding: 16px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 16px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--zest);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .qr-container {
      text-align: center;
      margin: 24px 0;
      display: none;
    }

    .qr-container.show {
      display: block;
    }

    .qr-container img {
      max-width: 200px;
      border: 2px solid #ddd;
      padding: 8px;
      border-radius: 4px;
    }

    .qr-instructions {
      font-size: 13px;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.5;
    }

    .step-indicator {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .step {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ddd;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .step.active {
      background: var(--zest);
      color: var(--black);
    }

    .step.complete {
      background: #4CAF50;
      color: white;
    }

    .section {
      display: none;
    }

    .section.show {
      display: block;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .button-group button {
      flex: 1;
    }

    button.secondary {
      background: #ddd;
      color: var(--black);
    }

    button.secondary:hover {
      background: #ccc;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="/spoke-logo-landscape-mineral.png" alt="Spoke" style="height: 80px; margin-bottom: 24px; display: block; margin-left: auto; margin-right: auto;">
      <p>Authenticator Login</p>
    </div>

    <div class="step-indicator">
      <div class="step active" id="step1">1</div>
      <div class="step" id="step2">2</div>
    </div>

    <!-- Step 1: Setup QR Code -->
    <div id="setupSection" class="section show">
      <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--mineral);">Scan QR Code</h2>
      <p style="font-size: 14px; color: var(--muted); margin-bottom: 16px;">Open Google Authenticator on your phone and scan this code:</p>

      <div class="qr-container show" id="qrContainer">
        <img id="qrCode" alt="QR Code" />
        <div class="qr-instructions">
          <strong>Don't have Google Authenticator?</strong><br>
          Download it free from your app store.
        </div>
      </div>

      <button onclick="skipSetup()">Already Have Authenticator?</button>
      <div id="setupMessage" class="message"></div>
      <div id="setupLoading" class="loading"></div>
    </div>

    <!-- Step 2: Verify Code -->
    <div id="verifySection" class="section">
      <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--mineral);">Enter 6-Digit Code</h2>
      <p style="font-size: 14px; color: var(--muted); margin-bottom: 16px;">Enter the code shown in Google Authenticator:</p>

      <form id="verifyForm" onsubmit="verifyCode(event)">
        <div class="form-group">
          <input
            type="text"
            id="code"
            name="code"
            placeholder="000000"
            maxlength="6"
            inputmode="numeric"
            pattern="[0-9]{6}"
            required
            autocomplete="off"
          >
        </div>
        <button type="submit" id="verifyBtn">Verify Code</button>
      </form>

      <button class="secondary" onclick="goBack()" style="margin-top: 12px;">Back</button>
      <div id="verifyMessage" class="message"></div>
      <div id="verifyLoading" class="loading"></div>
    </div>
  </div>

  <script>
    let currentSecret = null;

    // Step 1: Generate and display QR code
    async function initializeSetup() {
      const setupLoading = document.getElementById('setupLoading');
      setupLoading.innerHTML = '<span class="spinner"></span> Generating QR code...';
      setupLoading.classList.add('show');

      try {
        const response = await fetch('/api/auth/totp-setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await response.json();

        if (response.ok) {
          currentSecret = data.secret;
          document.getElementById('qrCode').src = data.qrCode;
          setupLoading.classList.remove('show');
        } else {
          showSetupMessage('Failed to generate QR code', 'error');
          setupLoading.classList.remove('show');
        }
      } catch (error) {
        console.error('Setup error:', error);
        showSetupMessage('Error generating QR code', 'error');
        setupLoading.classList.remove('show');
      }
    }

    function skipSetup() {
      // Move to verification step
      document.getElementById('setupSection').classList.remove('show');
      document.getElementById('verifySection').classList.add('show');
      document.getElementById('step1').classList.add('complete');
      document.getElementById('step2').classList.add('active');
      document.getElementById('code').focus();
    }

    async function verifyCode(event) {
      event.preventDefault();

      const code = document.getElementById('code').value.trim();
      const verifyBtn = document.getElementById('verifyBtn');
      const verifyLoading = document.getElementById('verifyLoading');

      if (code.length !== 6) {
        showVerifyMessage('Code must be 6 digits', 'error');
        return;
      }

      verifyBtn.disabled = true;
      verifyLoading.innerHTML = '<span class="spinner"></span> Verifying...';
      verifyLoading.classList.add('show');

      try {
        const response = await fetch('/api/auth/totp-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        if (response.ok) {
          showVerifyMessage('✓ Authenticated! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showVerifyMessage('Invalid code. Try again.', 'error');
          document.getElementById('code').value = '';
          document.getElementById('code').focus();
        }
      } catch (error) {
        console.error('Verify error:', error);
        showVerifyMessage('Authentication failed', 'error');
      } finally {
        verifyBtn.disabled = false;
        verifyLoading.classList.remove('show');
      }
    }

    function goBack() {
      document.getElementById('setupSection').classList.add('show');
      document.getElementById('verifySection').classList.remove('show');
      document.getElementById('step1').classList.remove('complete');
      document.getElementById('step2').classList.remove('active');
      document.getElementById('code').value = '';
    }

    function showSetupMessage(text, type) {
      const msg = document.getElementById('setupMessage');
      msg.textContent = text;
      msg.className = `message ${type} show`;
    }

    function showVerifyMessage(text, type) {
      const msg = document.getElementById('verifyMessage');
      msg.textContent = text;
      msg.className = `message ${type} show`;
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initializeSetup);

    // Auto-focus on code input when it becomes visible
    document.getElementById('code').addEventListener('input', function() {
      if (this.value.length === 6) {
        document.getElementById('verifyForm').submit();
      }
    });
  </script>
</body>
</html>
