<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Spoke Operating System</title>
  <link rel="icon" href="/spokefavcon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --mineral: #40514F;
      --zest: #BEDA81;
      --stone: #EDEDE1;
      --paper: #FAFAF4;
      --black: #1A1418;
      --muted: #68716E;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--mineral) 0%, #2a3a38 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--paper);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      padding: 48px;
      max-width: 500px;
      width: 100%;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header img {
      height: 80px;
      margin-bottom: 24px;
    }

    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--mineral);
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      letter-spacing: 4px;
      text-align: center;
      font-weight: 600;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--zest);
      box-shadow: 0 0 0 3px rgba(190, 218, 129, 0.1);
    }

    button {
      width: 100%;
      padding: 12px 24px;
      background: var(--zest);
      color: var(--black);
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #a4c767;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 24px;
      padding: 16px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 16px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--zest);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .qr-container {
      text-align: center;
      margin: 24px 0;
    }

    .qr-container img {
      max-width: 200px;
      border: 2px solid #ddd;
      padding: 8px;
      border-radius: 4px;
    }

    .qr-instructions {
      font-size: 13px;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="/spoke-logo-landscape-mineral.png" alt="Spoke" />
      <h1>Spoke OS</h1>
      <p>Secure Authentication</p>
    </div>

    <div class="form-group">
      <label>Scan QR Code with Google Authenticator</label>
      <div class="qr-container" id="qrContainer">
        <img id="qrCode" alt="QR Code" />
        <div class="qr-instructions">
          <strong>Don't have Google Authenticator?</strong><br>
          Download it free from your app store, then scan this code.
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Enter 6-digit code:</label>
      <input
        type="text"
        id="code"
        placeholder="000000"
        maxlength="6"
        inputmode="numeric"
        autocomplete="off"
      />
      <button onclick="verifyCode()">Verify Code</button>
    </div>

    <div id="message" class="message"></div>
    <div id="loading" class="loading">
      <span class="spinner"></span>
      Verifying...
    </div>
  </div>

  <script>
    // Generate QR code on page load
    async function initializeQR() {
      try {
        const response = await fetch('/api/auth/totp-setup', {
          method: 'POST',
          credentials: 'include'
        });
        const data = await response.json();
        document.getElementById('qrCode').src = data.qrCode;
      } catch (error) {
        console.error('Failed to generate QR code:', error);
        showMessage('Failed to generate QR code', 'error');
      }
    }

    async function verifyCode() {
      const code = document.getElementById('code').value.trim();
      const messageDiv = document.getElementById('message');
      const loadingDiv = document.getElementById('loading');
      const codeInput = document.getElementById('code');

      if (!code || code.length !== 6) {
        showMessage('Code must be 6 digits', 'error');
        return;
      }

      loadingDiv.classList.add('show');
      messageDiv.classList.remove('show');

      try {
        const response = await fetch('/api/auth/totp-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('✓ Authenticated! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showMessage('Invalid code. Try again.', 'error');
          codeInput.value = '';
          codeInput.focus();
        }
      } catch (error) {
        console.error('Verification error:', error);
        showMessage('Authentication failed. Try again.', 'error');
      } finally {
        loadingDiv.classList.remove('show');
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `message ${type} show`;
    }

    // Auto-submit on 6 digits
    document.getElementById('code').addEventListener('input', function() {
      if (this.value.length === 6) {
        verifyCode();
      }
    });

    // Initialize QR code on page load
    document.addEventListener('DOMContentLoaded', initializeQR);
  </script>
</body>
</html>
